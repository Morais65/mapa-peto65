// ── LOG ───────────────────────────────────────
function log(msg, tipo='info'){
  const el=document.getElementById('log');
  el.innerHTML+=`<div class="${tipo}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

// ── MIGRAÇÃO ──────────────────────────────────
window.iniciarMigracao = async function(){
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='⏳ MIGRANDO...';

  // Pede login
  const email=prompt('Digite seu e-mail do Firebase:');
  const senha=prompt('Digite sua senha:');
  if(!email||!senha){log('Migração cancelada.','warn');btn.disabled=false;btn.textContent='▶ INICIAR MIGRAÇÃO';return;}

  log('🔐 Autenticando...','info');
  try {
    await signInWithEmailAndPassword(auth,email,senha);
    log('✅ Autenticado com sucesso!','ok');
  } catch(e) {
    log('❌ Erro de autenticação: '+e.message,'err');
    btn.disabled=false; btn.textContent='▶ INICIAR MIGRAÇÃO';
    return;
  }

  // Limpa coleções existentes
  log('🧹 Verificando dados existentes...','info');
  for(const col of ['releases','suspeitos','areas']){
    const snap=await getDocs(collection(db,col));
    if(snap.size>0){
      log(`⚠️ Encontrados ${snap.size} registros em "${col}" — limpando...`,'warn');
      for(const d of snap.docs) await deleteDoc(doc(db,col,d.id));
      log(`✅ "${col}" limpo.`,'ok');
    }
  }

  // Insere releases
  log(`\n📋 Inserindo ${RELEASES.length} ocorrências...`,'info');
  let ok=0, err=0;
  for(const r of RELEASES){
    try {
      await addDoc(collection(db,'releases'),{...r,criadoEm:serverTimestamp()});
      log(`  ✅ ${r.tipo} — ${r.bairro} (${r.data})`,'ok');
      ok++;
    } catch(e){
      log(`  ❌ Erro: ${e.message}`,'err');
      err++;
    }
  }
  log(`📋 Releases: ${ok} inseridos, ${err} erros.`,'info');

  // Insere suspeitos
  log(`\n👤 Inserindo ${SUSPEITOS.length} suspeito(s)...`,'info');
  for(const s of SUSPEITOS){
    try {
      await addDoc(collection(db,'suspeitos'),{...s,criadoEm:serverTimestamp()});
      log(`  ✅ ${s.nome}`,'ok');
    } catch(e){ log(`  ❌ Erro: ${e.message}`,'err'); }
  }

  // Insere áreas
  log(`\n🗺️ Inserindo ${AREAS.length} área(s) faccionada(s)...`,'info');
  for(const a of AREAS){
    try {
      await addDoc(collection(db,'areas'),{...a,criadoEm:serverTimestamp()});
      log(`  ✅ ${a.faccao} — ${a.nome}`,'ok');
    } catch(e){ log(`  ❌ Erro: ${e.message}`,'err'); }
  }

  log('\n🎯 MIGRAÇÃO CONCLUÍDA!','ok');
  log('Pode fechar esta página e abrir o mapa normalmente.','info');
  btn.textContent='✅ CONCLUÍDO';
};
